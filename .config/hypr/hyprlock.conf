general {
  hide_cursor = true
}

background {
  monitor =
  color = rgb(232136)
}

input-field {
  monitor =
  size = 300, 50
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  outer_color = rgb(f6c177)
  inner_color = rgb(2a273f)
  font_color = rgb(e0def4)
  fade_on_empty = true
  placeholder_text = <i>Password...</i>
  hide_input = false
  rounding = 8
  check_color = rgb(9ccfd8)
  fail_color = rgb(eb6f92)
  fail_text = <i>$FAIL ($ATTEMPTS)</i>
  position = 0, -120
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M")"
  color = rgb(e0def4)
  font_size = 72
  font_family = JetBrainsMono Nerd Font
  position = 0, 100
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] echo "$(date +"%A, %B %d")"
  color = rgb(908caa)
  font_size = 20
  font_family = JetBrainsMono Nerd Font
  position = 0, 20
  halign = center
  valign = center
}
