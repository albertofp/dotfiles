name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: nix fmt -- --check .

      - name: Lint
        run: |
          nix run nixpkgs#statix -- check .
          nix run nixpkgs#deadnix -- .

  build:
    needs: [lint]
    strategy:
      matrix:
        include:
          - platform: nixos
            runner: ubuntu-latest
            target: nixosConfigurations.alberto.config.system.build.toplevel
          - platform: darwin
            runner: macos-latest
            target: darwinConfigurations.alberto-mac.system
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v17
        with:
          name: albertofp-dotfiles
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build
        run: |
          nix build .#${{ matrix.target }} \
            --no-link \
            --print-build-logs
